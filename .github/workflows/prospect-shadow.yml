name: Prospect shadow tracking

on:
  push:
    branches: [master]
    paths:
      - data/dd/prospect_model_inputs.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prospect-shadow-tracking
  cancel-in-progress: true

jobs:
  build-shadow-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -e . pytest

      - name: Run fresh-input-gated shadow pipeline
        run: python scripts/run_prospect_shadow_pipeline.py

      - name: Verify prospect shadow contracts
        run: |
          python -m pytest -q \
            tests/test_universal_prospect_model.py \
            tests/test_prospect_dynasty_backtest.py \
            tests/test_prospect_dynasty_layer.py \
            tests/test_prospect_forward_shadow.py

      - name: Commit changed shadow artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/models/valucast_universal_prospect_model.json \
            data/models/valucast_prospect_dynasty_backtest.json \
            data/models/valucast_prospect_dynasty_layer.json \
            data/models/valucast_prospect_forward_shadow.json \
            data/prediction_archive/valucast_universal_prospect_model \
            data/prediction_archive/valucast_prospect_dynasty_layer \
            data/prediction_archive/valucast_prospect_forward_shadow
          git diff --cached --quiet && exit 0
          git commit -m "Archive prospect shadow observations"
          git push origin master
