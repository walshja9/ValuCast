name: Daily public data refresh

on:
  schedule:
    # DD's VPS nightly starts at 7:00 AM ET. This runs at 9:30 AM EDT /
    # 8:30 AM EST so the generated dynasty feed and its Render deploy can land.
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      approve_valucast_buys:
        description: "Record explicit human approval for ValuCast-owned /buys promotion"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-public-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -e . pytest

      - name: Refresh MLB actuals and Steamer ROS
        run: python -m scraper.refresh

      - name: Refresh Baseball Savant player-card data
        run: python scripts/fetch_statcast_percentiles.py

      - name: Sync generated DD dynasty and buys feed
        run: python scripts/sync_dd_feed.py

      - name: Build ValuCast public snapshot gate
        env:
          VALUCAST_BUYS_REVIEW_APPROVED: ${{ github.event_name == 'workflow_dispatch' && inputs.approve_valucast_buys && '1' || '0' }}
        run: |
          python scripts/backfill_projection_identities.py
          python scripts/build_mlb_track_record.py
          python scripts/build_mlb_dynasty_layer.py
          python scripts/build_prospect_universe.py
          python scripts/build_prospect_availability.py
          python scripts/build_prospect_rank_v1.py
          python scripts/build_prospect_coverage_audit.py
          python scripts/build_prospect_calibration_report.py
          python scripts/build_valucast_buys.py
          python scripts/review_valucast_buys.py
          python scripts/build_valucast_buys.py --with-review
          python scripts/build_public_dynasty_snapshot.py
          python scripts/build_valucast_quality_governor.py

      - name: Validate public artifacts
        run: |
          python scripts/validate_feed.py
          python scripts/validate_mlb_track_record.py
          python scripts/validate_prospect_coverage_audit.py
          python scripts/validate_prospect_calibration_report.py
          python scripts/validate_valucast_buys.py
          python scripts/validate_valucast_quality_governor.py
          python scripts/validate_public_dynasty_snapshot.py
          python scripts/validate_public_data_freshness.py
          python -m pytest -q \
            tests/test_refresh.py \
            tests/test_dd_feed_integrity.py \
            tests/test_public_data_refresh.py \
            tests/test_public_dynasty_snapshot.py \
            tests/test_valucast_quality_governor.py

      - name: Commit and publish refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/actuals/current.json \
            data/dd/dd_dynasty_feed.json \
            data/mlb/mlb_track_record_cache.json \
            data/models/valucast_mlb_dynasty_layer.json \
            data/models/valucast_mlb_track_record.json \
            data/models/valucast_quality_governor.json \
            data/models/valucast_prospect_buys.json \
            data/models/valucast_prospect_buys_review.json \
            data/models/valucast_prospect_availability.json \
            data/models/valucast_prospect_coverage_audit.json \
            data/models/valucast_prospect_calibration_report.json \
            data/models/valucast_prospect_universe.json \
            data/models/valucast_prospect_rank_v1.json \
            data/prediction_archive/valucast_mlb_dynasty_layer \
            data/prediction_archive/valucast_mlb_track_record \
            data/prediction_archive/valucast_prospect_buys \
            data/prediction_archive/valucast_prospect_rank_v1 \
            data/projections/current.json \
            data/projections/metadata.json \
            data/projections/ros.json \
            data/public/public_dynasty_snapshot.json \
            data/statcast/percentiles.json \
            projections/data/identity.json
          git diff --cached --quiet && exit 0
          git commit -m "data: daily public refresh $(date -u +%Y-%m-%d)"
          git push origin master
