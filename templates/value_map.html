{% extends "base.html" %}

{% block title %}Value Map | ValuCast{% endblock %}

{% block content %}
<nav class="horizon-tabs" aria-label="Value map navigation">
    <a href="/?mode=dd_dynasty" class="htab htab-dynasty">Dynasty</a>
    <a href="/?mode=prospects" class="htab htab-prospects">Prospects</a>
    <a href="/map" class="htab on" aria-current="page">Map</a>
    <a href="/buys" class="htab">Buys</a>
</nav>

<section class="map-heading glass">
    <div>
        <h2>Value Map</h2>
        <p>Dynasty value vs age · {{ player_count }} players{% if dd_generated_at %} · updated {{ dd_generated_at[:10] }}{% endif %}</p>
    </div>
    <div class="map-controls">
        <fieldset class="pool-toggle" aria-label="Map player pool">
            <label class="pool-btn"><input type="radio" name="map-pool" value="all" checked><span>All</span></label>
            <label class="pool-btn"><input type="radio" name="map-pool" value="mlb"><span>MLB</span></label>
            <label class="pool-btn"><input type="radio" name="map-pool" value="prospect"><span>Prospects</span></label>
        </fieldset>
        <select id="map-position" class="position-select" aria-label="Map position">
            <option value="">All Positions</option>
            {% for pos in ["C","1B","2B","SS","3B","OF","DH","SP","RP"] %}
            <option value="{{ pos }}">{{ pos }}</option>
            {% endfor %}
        </select>
    </div>
</section>

<section class="value-map-shell glass">
    <svg id="value-map" viewBox="0 0 1000 640" role="img" aria-label="Scatter plot of dynasty value by player age"></svg>
    <div id="map-tooltip" class="map-tooltip glass" hidden></div>
</section>
<div class="map-legend" aria-label="Map colors">
    <span class="map-legend-hitter">Hitters</span>
    <span class="map-legend-sp">SP</span>
    <span class="map-legend-rp">RP</span>
    <span class="map-legend-prospect">Prospects</span>
</div>

<script id="map-data" type="application/json">{{ players | tojson }}</script>
<script>
(function () {
    const players = JSON.parse(document.getElementById('map-data').textContent);
    const svg = document.getElementById('value-map');
    const tooltip = document.getElementById('map-tooltip');
    const shell = document.querySelector('.value-map-shell');
    const ns = 'http://www.w3.org/2000/svg';
    const colors = { hitter: '#4f86f7', sp: '#a78bfa', rp: '#2dd4c5', prospect: '#34d399' };
    const pad = { left: 62, right: 24, top: 30, bottom: 52 };
    let W = 1000, H = 640;
    let pool = 'all';
    let position = '';
    let selected = null;

    function boardUrl(player) {
        const params = new URLSearchParams({
            mode: player.player_type === 'prospect' ? 'prospects' : 'dd_dynasty',
            search: player.name
        });
        return '/?' + params.toString();
    }

    function el(name, attrs, text) {
        const node = document.createElementNS(ns, name);
        Object.entries(attrs || {}).forEach(([key, value]) => node.setAttribute(key, value));
        if (text != null) node.textContent = text;
        return node;
    }

    function filtered() {
        return players.filter(player =>
            (pool === 'all' || player.player_type === pool) &&
            (!position || player.position === position)
        );
    }

    function showTooltip(player, x, y) {
        tooltip.innerHTML =
            '<strong>' + player.name.replaceAll('&', '&amp;').replaceAll('<', '&lt;') + '</strong>' +
            '<span>' + player.position + ' · age ' + player.age + ' · value ' + player.value.toFixed(1) + '</span>' +
            '<a href="' + boardUrl(player) + '">Find on board</a>';
        tooltip.hidden = false;
        const left = Math.max(8, Math.min(shell.clientWidth - 190, x + 12));
        const top = Math.max(8, Math.min(shell.clientHeight - 92, y - 42));
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
    }

    function render() {
        // viewBox tracks the shell so SVG units == CSS px (no letterboxing on phones).
        W = Math.max(360, shell.clientWidth || 1000);
        H = Math.max(320, shell.clientHeight || 640);
        svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
        const rows = filtered();
        svg.replaceChildren();
        tooltip.hidden = true;
        selected = null;
        if (!rows.length) return;

        const ages = rows.map(player => player.age);
        const values = rows.map(player => player.value);
        const minAge = Math.floor(Math.min(...ages)) - 1;
        const maxAge = Math.ceil(Math.max(...ages)) + 1;
        const maxValue = Math.ceil(Math.max(...values) / 10) * 10;
        const sx = age => pad.left + (age - minAge) / (maxAge - minAge || 1) * (W - pad.left - pad.right);
        const sy = value => H - pad.bottom - value / (maxValue || 1) * (H - pad.top - pad.bottom);

        for (let age = Math.ceil(minAge / 5) * 5; age <= maxAge; age += 5) {
            const x = sx(age);
            svg.append(el('line', { x1: x, y1: pad.top, x2: x, y2: H - pad.bottom, class: 'map-grid' }));
            svg.append(el('text', { x, y: H - pad.bottom + 24, class: 'map-tick', 'text-anchor': 'middle' }, age));
        }
        for (let value = 0; value <= maxValue; value += 25) {
            const y = sy(value);
            svg.append(el('line', { x1: pad.left, y1: y, x2: W - pad.right, y2: y, class: 'map-grid' }));
            svg.append(el('text', { x: 50, y: y + 4, class: 'map-tick', 'text-anchor': 'end' }, value));
        }
        svg.append(el('text', { x: pad.left + (W - pad.left - pad.right) / 2, y: H - 6, class: 'map-axis', 'text-anchor': 'middle' }, 'Age'));
        svg.append(el('text', { x: 15, y: H / 2, class: 'map-axis', transform: 'rotate(-90 15 ' + (H / 2) + ')', 'text-anchor': 'middle' }, 'Dynasty value'));

        rows.forEach(player => {
            const circle = el('circle', {
                cx: sx(player.age), cy: sy(player.value), r: 3.5,
                fill: colors[player.group], class: 'map-point', tabindex: 0
            });
            const show = event => {
                const rect = shell.getBoundingClientRect();
                const clientX = event.clientX || rect.left + sx(player.age) / W * rect.width;
                const clientY = event.clientY || rect.top + sy(player.value) / H * rect.height;
                showTooltip(player, clientX - rect.left, clientY - rect.top);
            };
            circle.addEventListener('mouseenter', show);
            circle.addEventListener('focus', show);
            circle.addEventListener('click', event => {
                event.stopPropagation();
                if (selected === player.id) window.location.href = boardUrl(player);
                else { selected = player.id; show(event); }
            });
            svg.append(circle);
        });

        const occupied = [];
        rows.slice().sort((a, b) => b.value - a.value).slice(0, 12).forEach((player, index) => {
            const x = sx(player.age) + 7;
            let y = sy(player.value) - 5;
            const width = Math.min(120, player.name.length * 6 + 8);
            for (let tries = 0; tries < 8 && occupied.some(box =>
                x < box.x + box.w && x + width > box.x && y - 10 < box.y && y + 3 > box.y - 12
            ); tries += 1) y += tries % 2 ? 13 : -13;
            occupied.push({ x, y, w: width });
            svg.append(el('text', { x, y, class: 'map-label' }, player.name));
        });
    }

    document.querySelectorAll('input[name="map-pool"]').forEach(input => input.addEventListener('change', () => {
        pool = input.value;
        render();
    }));
    document.getElementById('map-position').addEventListener('change', event => {
        position = event.target.value;
        render();
    });
    shell.addEventListener('click', () => { selected = null; tooltip.hidden = true; });
    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(render, 150);
    });
    render();
})();
</script>
{% endblock %}
